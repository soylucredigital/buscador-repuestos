<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>Buscador de Repuestos</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    #chat { max-width:600px; margin:50px auto; background:white; padding:20px; border-radius:10px; }
    .msg { margin:10px 0; }
    .user { text-align:right; }
    .bot { text-align:left; color:#333; }
    input { width:80%; padding:10px; }
    button { padding:10px; }
  </style>
</head>
<body>

<div id="chat">
  <h2>Buscador de Repuestos</h2>
  <div id="messages"></div>
  <input id="input" placeholder="Ej: bujias astra 2.0">
  <button onclick="enviar()">Enviar</button>
</div>

<script>
async function enviar() {
  const input = document.getElementById("input");
  const msg = input.value.trim();

  console.log("MENSAJE ENVIADO:", msg);

  if (!msg) {
    alert("Escribí algo");
    return;
  }

  agregar(msg, "user");

  const res = await fetch("https://soylucredigital.app.n8n.cloud/webhook/repuestos", {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({ mensaje: msg })
  });

  const data = await res.json();

  const texto = data?.respuesta || "Error en respuesta";

  agregar(texto, "bot");

  input.value = "";
}

function agregar(texto, tipo) {
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.innerText = texto;
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
